# SmithAI-Server configuration
# Choose which model to load by setting the path below.

server:
  host: 0.0.0.0
  # Default port is 8000. Many hosting platforms set the PORT environment variable,
  # which the server uses automatically if present.
  port: 8000
  # Rate limit: max requests per second per client IP
  rate_limit: 10.0

model:
  # Model name for display/logging
  name: "SmithGPT 1.0 4GB"

  # Path to the GGUF model file
  # For SmithGPT 1.0 (4GB): models/smithgpt-1.0-4.gguf
  # For SmithGPT 2.0 (7.5GB): models/smithgpt-2.0-7.5.gguf
  path: "models/smithgpt-1.0-4.gguf"

  # Context window size (tokens)
  context_size: 4096

  # Maximum tokens per response
  max_tokens: 200

  # CPU threads for inference (keep low on shared hosts)
  n_threads: 2

# Security: the server generates an API key on first start if this is left blank.
# The key is printed to the console and must be pasted into the Minecraft plugin
# using the /SmithAPI set <key> command.
security:
  api_key: ""
