# SmithAI-Server configuration
# Run ./BuildGPT1.0 or ./BuildGPT2.0 to download a model, then start with:
#   source venv/bin/activate && python app.py
server:
  host: 0.0.0.0
  port: 8000
model:
  context_size: 4096
  max_tokens: 200
  n_threads: 2
  name: SmithGPT 1.0 2.2GB
  path: models/smithgpt-1.0-2.2gb.gguf
security:
  api_key: ""
