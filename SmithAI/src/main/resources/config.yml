# SmithAI Official Configuration

ai:
  # The name shown above the NPC in-game
  name: "Smith_AI"

  # Skin: "robot" uses the built-in robot skin. Players can also set a custom skin URL.
  skin: "robot"

  # Conversation memory: number of recent messages the NPC remembers
  memory:
    maxMessages: 17

  # External AI server: SmithGPT 1.0 (7.5GB) or SmithGPT 2.0 (15GB)
  external:
    enabled: false
    # Example URLs for Replit, Codespaces, local machines, or VPS:
    # http://localhost:8000
    # http://192.168.1.50:8000
    # https://your-replit-app.replit.app
    # https://your-codespace-8000.github.dev
    url: "http://localhost:8000"
    timeout: 10
    # API key for the external server. Generated by SmithAI-Server on first start.
    # Format: SMA-<random string>. Set in-game with /SmithAPI set SMA-...
    apiKey: ""
    # Model identifier for logging/display: smithgpt-1.0-7.5 or smithgpt-2.0-15
    # The actual model loaded is decided by the SmithAI-Server you run.
    model: "smithgpt-1.0-7.5"

  # Built-in local AI: Smith-Mini 1.0
  local:
    enabled: true
    modelPath: "plugins/SmithAI/models/smith-mini-1.0.gguf"
    fallbackToRules: true
    threadCount: 1

  # How often (seconds) to retry the external AI server if it goes offline
  reconnectInterval: 30

  # Show a chat message when switching between models
  statusMessage: true

  # Remind players to connect the API key every 10-50 seconds when external AI is enabled but no key is set.
  # Also shown on plugin startup.
  reminder:
    enabled: true
    minSeconds: 10
    maxSeconds: 50

# Skill settings
skills:
  # Maximum number of skills the AI can queue at once
  maxQueueSize: 50
  # Delay between skill steps (ticks)
  stepDelay: 5

# Training settings
training:
  # Whether players can train by saying "good bot" / "bad bot"
  chatFeedback: true
  # Save training data to disk
  persist: true

# NPC settings
npc:
  # Default follow distance
  followDistance: 3.0
  # Pathfinder timeout in seconds
  pathfinderTimeout: 30
