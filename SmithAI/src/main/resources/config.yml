# SmithAI configuration

ai:
  name: "Smith_AI"
  skin: "robot"
  memory:
    maxMessages: 17
  external:
    enabled: false
    url: "http://localhost:8000"
    apiKey: ""
    model: "smithgpt-1.0-7.5"
    timeout: 10
  local:
    enabled: true
    modelPath: "plugins/SmithAI/models/smith-mini-1.0.gguf"
    fallbackToRules: true
    threadCount: 1
  reconnectInterval: 30
  statusMessage: true
  reminder:
    enabled: true
    minSeconds: 10
    maxSeconds: 50

skills:
  maxQueueSize: 50
  stepDelay: 5

training:
  chatFeedback: true
  persist: true

npc:
  followDistance: 3.0
  pathfinderTimeout: 30

debug:
  enabled: false

metrics:
  bstats: false
